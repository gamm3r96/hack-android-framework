name: CI - Tool Validation

on:
  push:
    branches: [ main ]
    paths:
      - 'tools/*.py'
      - '.github/workflows/ci-tool-validate.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'tools/*.py'

jobs:
  validate-tools:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Syntax Linter
        run: python -m pip install --upgrade pyflakes pycodestyle

      - name: Lint Python Tools
        run: |
          for f in tools/*.py; do
            echo "🔍 Linting $f"
            pyflakes "$f"
            pycodestyle --max-line-length=120 "$f"
          done

      - name: Create Test Fixtures
        run: |
          mkdir -p test_fixtures/api test_fixtures/logs test_fixtures/build
          echo -e "binder: 1000:1000 transaction 1 from 1234:5678 to 9876:5432\nbinder: 1000:1000 transaction 2 from 1111:2222 to 9876:5432" > test_fixtures/logs/binder_test.log
          echo -e "cc_library {\n  name: \"libexample\",\n  deps: [\"libbase\"],\n  srcs: [\"src.cpp\"]\n}" > test_fixtures/build/Android.bp
          echo -e "package android {\n  class Foo {\n    method void bar()\n  }\n}" > test_fixtures/api/old.txt
          cp test_fixtures/api/old.txt test_fixtures/api/new.txt
          echo "  class Baz {\n    method void qux()\n  }" >> test_fixtures/api/new.txt

      - name: Run Binder Trace Parser
        run: python tools/binder_trace_parser.py test_fixtures/logs/binder_test.log

      - name: Run Soong Build Inspector
        run: python tools/soong_build_inspector.py test_fixtures/build

      - name: Run Framework API Diff
        run: python tools/framework_api_diff.py test_fixtures/api/old.txt test_fixtures/api/new.txt

      - name: Cleanup
        run: rm -rf test_fixtures